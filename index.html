<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Workout Planner Gem</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.container a{

    padding: 5px;
    position: fixed;
    font-size: 50px;
    animation: about 2s linear infinite;
    text-decoration: none;
}
@keyframes about{

    0%{
        color: #000;
    }

    10%{
        color: #001;
    }

    20%{
        color: #002;
    }

    30%{
        color: #003;
    }

    40%{
        color: #004;
    }

    50%{
        color: #005;
    }

    60%{
        color: #006;
    }

    70%{
        color: #007;
    }

    80%{
        color: #008;
    }

    90%{

        color: #009;

    }

    100%{

        color: #011;

    }

}

h1{
text-align:center;
margin-bottom:25px;
}

.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:20px;
font-size:16px;
}

.exerciseList{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
justify-content:center;
}

.exerciseButton{
background:#3b82f6;
border:none;
padding:10px 18px;
color:white;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.exerciseButton:hover{
background:#2563eb;
transform:scale(1.05);
}

.suggest{
display:block;
margin:auto;
margin-bottom:25px;
padding:12px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.week{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.day{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.day h2{
text-align:center;
margin-top:0;
}

.exerciseRow{
margin-top:10px;
background:#334155;
padding:10px;
border-radius:10px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.delete{
background:#ef4444;
border:none;
color:white;
border-radius:6px;
padding:3px 8px;
cursor:pointer;
}

.videos iframe{
width:100%;
height:160px;
border:none;
margin-top:8px;
border-radius:8px;
}

@media(max-width:600px){

.container{
padding:15px;
}

.exerciseButton{
font-size:12px;
padding:8px 12px;
}

.videos iframe{
height:130px;
}

}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect}=React

const exercises=[

{name:"Push Ups",videos:["https://www.youtube.com/embed/IODxDxX7oi4"]},

{name:"Squats",videos:["https://www.youtube.com/embed/aclHkVaku9U"]},

{name:"Pull Ups",videos:["https://www.youtube.com/embed/eGo4IYlbE5g"]},

{name:"Plank",videos:["https://www.youtube.com/embed/pSHjTRCQxIw"]},

{name:"Bench Press",videos:["https://www.youtube.com/embed/gRVjAtPip0Y"]},

{name:"Deadlift",videos:["https://www.youtube.com/embed/op9kVnSso6Q"]}

]

const days=[
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday",
"Sunday"
]

function App(){

const [week,setWeek]=useState({})
const [search,setSearch]=useState("")

useEffect(()=>{

const saved=localStorage.getItem("weekWorkout")

if(saved){
setWeek(JSON.parse(saved))
}

},[])

useEffect(()=>{
localStorage.setItem("weekWorkout",JSON.stringify(week))
},[week])

function addExercise(day,ex){

const dayList=week[day]||[]

if(!dayList.find(e=>e.name===ex.name)){

setWeek({
...week,
[day]:[...dayList,ex]
})

}

}

function removeExercise(day,name){

setWeek({
...week,
[day]:week[day].filter(e=>e.name!==name)
})

}

function suggestExercises(){

const newWeek={}

days.forEach(day=>{

const random=exercises[Math.floor(Math.random()*exercises.length)]

newWeek[day]=[random]

})

setWeek(newWeek)

}

const filtered=exercises.filter(e=>
e.name.toLowerCase().includes(search.toLowerCase())
)

return(

<div className="container">

<h1>Weekly Workout Planner Gem</h1>
<a href="https://omrprogramming036-eng.github.io/protfolio">About me</a>

<input
className="search"
placeholder="Search exercise..."
value={search}
onChange={(e)=>setSearch(e.target.value)}
/>

<div className="exerciseList">

{filtered.map(ex=>(

<button
key={ex.name}
className="exerciseButton"
onClick={()=>{

const day=prompt("Enter day (Monday - Sunday)")
if(day) addExercise(day,ex)

}}
>

{ex.name}

</button>

))}

</div>

<button className="suggest" onClick={suggestExercises}>
Auto Suggest Weekly Plan
</button>

<div className="week">

{days.map(day=>(

<div className="day" key={day}>

<h2>{day}</h2>

{week[day]?.map((ex,i)=>(

<div className="exerciseRow" key={i}>

<div className="header">

<span>{ex.name}</span>

<button
className="delete"
onClick={()=>removeExercise(day,ex.name)}
>
X
</button>

</div>

<div className="videos">

{ex.videos.map((v,index)=>(
<iframe key={index} src={v} allowFullScreen></iframe>
))}

</div>

</div>

))}

</div>

))}

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
